# =============================================================================
# webapp - Default Values
# =============================================================================
# These defaults target a development/staging profile. Override for production
# using a separate values file (e.g., values-production.yaml).

# ---------------------------------------------------------------------------
# Container Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/example-org/webapp
  # -- Overrides the image tag. Defaults to the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: ghcr-credentials

# -- Override the release name used in resource names
nameOverride: ""
# -- Override the full resource name (disables prefix logic)
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Replicas
# ---------------------------------------------------------------------------
# Ignored when autoscaling.enabled is true.
replicaCount: 2

# ---------------------------------------------------------------------------
# Resource Requests & Limits
# ---------------------------------------------------------------------------
# Start conservative; right-size with VPA recommendations or metrics.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  # -- Target average CPU utilization (percentage of request)
  targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  # -- Named port exposed by the container
  portName: http
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/rate-limit: "100"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: webapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: webapp-tls
  #   hosts:
  #     - webapp.example.com

# ---------------------------------------------------------------------------
# Health Probes
# ---------------------------------------------------------------------------
# The application must expose /healthz (liveness), /ready (readiness),
# and /startup (startup) endpoints.
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  startup:
    httpGet:
      path: /startup
      port: http
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    # -- Allow up to 5 minutes for slow startups (failureThreshold * periodSeconds)
    failureThreshold: 60
    successThreshold: 1

# ---------------------------------------------------------------------------
# Security Context  (Restricted Pod Security Standards)
# ---------------------------------------------------------------------------
# These settings comply with the "restricted" PSS profile.
# See: https://kubernetes.io/docs/concepts/security/pod-security-standards/
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  # -- Create a dedicated ServiceAccount for the pods
  create: true
  # -- Annotations to add (e.g., for IAM roles)
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/webapp
  # -- Name override. Defaults to fullname if empty.
  name: ""
  # -- Opt out of automounting the API token when not needed
  automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  # -- Minimum available pods during voluntary disruptions
  minAvailable: 1
  # maxUnavailable: 1

# ---------------------------------------------------------------------------
# Monitoring (Prometheus Operator)
# ---------------------------------------------------------------------------
monitoring:
  serviceMonitor:
    enabled: false
    # -- Namespace for the ServiceMonitor (defaults to release namespace)
    namespace: ""
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s
    # -- Metrics endpoint path
    path: /metrics
    # -- Port to scrape
    port: http
    # -- Extra labels to match the Prometheus selector
    additionalLabels: {}
    # -- Metric relabeling rules
    metricRelabelings: []
    # -- Target relabeling rules
    relabelings: []

# ---------------------------------------------------------------------------
# Additional Configuration
# ---------------------------------------------------------------------------
# -- Extra environment variables injected into the container
env: []
# - name: LOG_LEVEL
#   value: "info"
# - name: DATABASE_URL
#   valueFrom:
#     secretKeyRef:
#       name: webapp-db
#       key: url

# -- Extra volume mounts (appended to the default tmp mount)
extraVolumeMounts: []

# -- Extra volumes (appended to the default tmp volume)
extraVolumes: []

# -- Additional pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

# -- Node selector constraints
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules (merged with default anti-affinity)
affinity: {}

# -- Topology spread constraints (override the default)
topologySpreadConstraints: []
