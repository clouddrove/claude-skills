# =============================================================================
# Webapp - Shared Values (All Environments)
# =============================================================================
# Values in this file are applied to every environment. Environment-specific
# overrides (replica count, resources, image tag, etc.) are layered on top
# via the helmfile.yaml release definition.

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/example-org/webapp
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-credentials

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  portName: http

# ---------------------------------------------------------------------------
# Ingress (base config; host and TLS are set per-environment)
# ---------------------------------------------------------------------------
ingress:
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

# ---------------------------------------------------------------------------
# Health Probes
# ---------------------------------------------------------------------------
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  startup:
    httpGet:
      path: /startup
      port: http
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60
    successThreshold: 1

# ---------------------------------------------------------------------------
# Security Context (Restricted PSS)
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Autoscaling Behavior (shared tuning; enable/min/max per environment)
# ---------------------------------------------------------------------------
autoscaling:
  targetCPUUtilizationPercentage: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

# ---------------------------------------------------------------------------
# Pod Annotations
# ---------------------------------------------------------------------------
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

# ---------------------------------------------------------------------------
# Common Labels
# ---------------------------------------------------------------------------
podLabels:
  app.kubernetes.io/part-of: webapp-stack
  app.kubernetes.io/component: backend
